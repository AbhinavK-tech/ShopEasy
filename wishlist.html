<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopEasy - Wishlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .wishlist {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            font-size: 18px;
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .cart-btn {
            background: #28a745;
            color: white;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: gray;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            padding: 15px;
            background: #111;
            color: white;
        }
    </style>
</head>

<body>

<header>
    ❤️ ShopEasy Wishlist
</header>

<div class="container">
    <h2>Your Wishlist</h2>

    <div id="wishlistContainer" class="wishlist">
        <!-- Items will be loaded here -->
    </div>

    <div id="emptyMessage" class="empty" style="display:none;">
        <h3>Your wishlist is empty 😢</h3>
        <p>Add items to your wishlist to see them here.</p>
    </div>
</div>

<footer>
    © 2026 ShopEasy | All Rights Reserved
</footer>

<script>
    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    const container = document.getElementById("wishlistContainer");
    const emptyMsg = document.getElementById("emptyMessage");

    function loadWishlist() {
        container.innerHTML = "";

        if (wishlist.length === 0) {
            emptyMsg.style.display = "block";
            return;
        }

        emptyMsg.style.display = "none";

        wishlist.forEach((item, index) => {
            let card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
                <img src="${item.image}" alt="${item.name}">
                <h3>${item.name}</h3>
                <div class="price">₹${item.price}</div>
                <button class="btn cart-btn" onclick="addToCart(${index})">Add to Cart</button>
                <button class="btn remove-btn" onclick="removeItem(${index})">Remove</button>
            `;

            container.appendChild(card);
        });
    }

    function removeItem(index) {
        wishlist.splice(index, 1);
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
        loadWishlist();
    }

    function addToCart(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push(wishlist[index]);
        localStorage.setItem("cart", JSON.stringify(cart));
        alert("Added to cart ✅");
    }

    loadWishlist();
</script>

</body>
</html>
