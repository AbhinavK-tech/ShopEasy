<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f3f6;
    margin: 0;
}

.header {
    background: #2874f0;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 20px;
}

.order-card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    display: flex;
    gap: 15px;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.order-card img {
    width: 80px;
    border-radius: 5px;
}

.order-details {
    flex: 1;
}

.order-details h4 {
    margin: 0;
}

.price {
    color: green;
    font-weight: bold;
}

.status {
    font-weight: bold;
    margin-top: 5px;
}

.logout-btn {
    background: red;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    float: right;
    margin: 10px;
}
</style>

</head>

<body>

<div class="header">
    My Orders
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container" id="ordersContainer"></div>

<script>
// Check login
let user = localStorage.getItem("loggedInUser");

if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
}

// Get all orders
let allOrders = JSON.parse(localStorage.getItem("orders")) || [];

// Filter orders for logged-in user
let userOrders = allOrders.filter(order => order.user === user);

let container = document.getElementById("ordersContainer");

if (userOrders.length === 0) {
    container.innerHTML = "<p>No orders yet 😢</p>";
} else {
    userOrders.forEach(order => {
        container.innerHTML += `
            <div class="order-card">
                <img src="https://via.placeholder.com/80">
                <div class="order-details">
                    <h4>${order.product}</h4>
                    <p class="price">₹${order.price}</p>
                    <p class="status">Status: ${order.status}</p>
                </div>
            </div>
        `;
    });
}

// Logout
function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
