<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders - ShopEasy</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f3f6;
    margin: 0;
}

/* Header */
.header {
    background: #2874f0;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Logout */
.logout-btn {
    background: red;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    float: right;
    margin: 10px;
}

/* Container */
.container {
    padding: 20px;
}

/* Order Card */
.order-card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    display: flex;
    gap: 15px;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.order-card img {
    width: 80px;
    border-radius: 5px;
}

.order-details {
    flex: 1;
}

.order-details h4 {
    margin: 0;
}

.price {
    color: green;
    font-weight: bold;
}

.status {
    font-weight: bold;
    margin-top: 5px;
    color: #2874f0;
}

.date {
    font-size: 12px;
    color: gray;
}

/* Empty */
.empty {
    text-align: center;
    margin-top: 50px;
    color: gray;
}

/* ================= TRACKER ================= */

.tracker {
    position: relative;
    margin-top: 15px;
    padding-top: 20px;
}

/* Base line */
.tracker::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 0;
    width: 100%;
    height: 4px;
    background: #ddd;
}

/* Progress line */
.progress {
    position: absolute;
    top: 10px;
    left: 0;
    height: 4px;
    background: #2874f0;
    transition: width 1s ease;
}

/* Steps */
.steps {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
}

.steps span {
    color: gray;
}

/* Active step */
.steps .active {
    color: #2874f0;
    font-weight: bold;
}

/* Truck */
.truck {
    position: absolute;
    top: -5px;
    font-size: 18px;
    transform: translateX(-50%);
    transition: left 1s ease;
}
</style>

</head>

<body>

<div class="header">My Orders</div>
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="container" id="ordersContainer"></div>

<script>

// ================= LOGIN =================
let user = localStorage.getItem("loggedInUser");

if(!user){
    alert("Please login first");
    window.location.href = "login.html";
}

// ================= GET ORDERS =================
let allOrders = JSON.parse(localStorage.getItem("orders")) || [];
let userOrders = allOrders.filter(order => order.user === user);

let container = document.getElementById("ordersContainer");

// ================= DISPLAY =================
if (userOrders.length === 0) {
    container.innerHTML = `
        <div class="empty">
            <h3>No orders yet 😢</h3>
            <p>Start shopping to see your orders here!</p>
        </div>
    `;
} else {
    userOrders.reverse().forEach(order => {

        container.innerHTML += `
        <div class="order-card">
            <img src="${order.image}">
            <div class="order-details">
                <h4>${order.product}</h4>
                <p class="price">₹${order.price}</p>
                <p class="status">Status: ${order.status}</p>
                <p class="date">Ordered on: ${order.date}</p>

                <div class="tracker">
                    <div class="progress" style="width:${getProgress(order.status)}%"></div>

                    <div class="steps">
                        <span class="${getClass(order.status,'Ordered')}">Ordered</span>
                        <span class="${getClass(order.status,'Shipped')}">Shipped</span>
                        <span class="${getClass(order.status,'Out for Delivery')}">Out for Delivery</span>
                        <span class="${getClass(order.status,'Delivered')}">Delivered</span>
                    </div>

                    <div class="truck" style="left:${getProgress(order.status)}%">🚚</div>
                </div>
            </div>
        </div>
        `;
    });
}

// ================= TRACKING LOGIC =================
function getProgress(status) {
    switch(status) {
        case "Ordered": return 10;
        case "Shipped": return 40;
        case "Out for Delivery": return 70;
        case "Delivered": return 100;
        default: return 10;
    }
}

function getClass(status, step) {
    const steps = ["Ordered", "Shipped", "Out for Delivery", "Delivered"];
    return steps.indexOf(step) <= steps.indexOf(status) ? "active" : "";
}

// ================= AUTO UPDATE =================
function updateOrderStatus() {
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.forEach(order => {
        if(order.status === "Ordered") order.status = "Shipped";
        else if(order.status === "Shipped") order.status = "Out for Delivery";
        else if(order.status === "Out for Delivery") order.status = "Delivered";
    });

    localStorage.setItem("orders", JSON.stringify(orders));
}

// Demo update every 5 sec
setInterval(() => {
    updateOrderStatus();
    location.reload();
}, 5000);

// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}

</script>

</body>
</html>
