<!DOCTYPE html>
<html>
<head>
    <title>ShopEasy Admin</title>
    <link rel="icon" type="image/png" href="ShopEasy logo.png">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2874f0;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            margin: 10px 0;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #333;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout {
            background: red;
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            color: gray;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #2874f0;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        button {
            padding: 5px 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Low stock */
        .low-stock {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .alert {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🛍 ShopEasy</h2>
    <a href="#">📊 Dashboard</a>
    <a href="#">📦 Orders</a>
    <a href="#">📉 Stock</a>
</div>

<!-- Main -->
<div class="main">

    <!-- 🔐 AUTH CHECK -->
    <script>
    fetch("http://localhost:8080/shopeasy/check-admin")
    .then(res => res.text())
    .then(data => {
        if(data.trim() !== "AUTHORIZED"){
            alert("Access Denied ❌");
            window.location.href = "admin-login.html";
        }
    });
    </script>

    <!-- Topbar -->
    <div class="topbar">
        <h2>📊 Admin Dashboard</h2>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Orders</h3>
            <p id="totalOrders">0</p>
        </div>

        <div class="card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">₹0</p>
        </div>

        <div class="card">
            <h3>Low Stock Items</h3>
            <p id="lowStockCount">0</p>
        </div>
    </div>

    <!-- Orders -->
    <h3>📦 Orders</h3>
    <table id="ordersTable">
        <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </table>

    <!-- Low Stock -->
    <div class="low-stock">
        <h3>📉 Low Stock Alerts</h3>
        <ul id="lowStockList"></ul>
    </div>

</div>

<script>

// LOAD ORDERS + STATS
function loadOrders(){
    fetch("http://localhost:8080/shopeasy/get-orders")
    .then(res => res.json())
    .then(data => {

        let table = document.getElementById("ordersTable");
        let total = 0;
        let revenue = 0;

        table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
        </tr>`;

        data.forEach(order => {

            total++;
            revenue += order.price;

            let row = table.insertRow();

            row.innerHTML = `
                <td>${order.id}</td>
                <td>${order.product}</td>
                <td>${order.qty}</td>
                <td>₹${order.price}</td>
                <td>${order.status}</td>
                <td>
                    ${order.status === "Delivered" ?
                        "✅" :
                        `<button onclick="deliver(${order.id})">Deliver</button>`
                    }
                </td>
            `;
        });

        document.getElementById("totalOrders").innerText = total;
        document.getElementById("totalRevenue").innerText = "₹" + revenue;
    });
}

// DELIVER
function deliver(id){
    fetch("http://localhost:8080/shopeasy/update-status", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: "id=" + id
    })
    .then(() => {
        loadOrders();
    });
}

// LOW STOCK
function loadLowStock(){
    fetch("http://localhost:8080/shopeasy/low-stock")
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("lowStockList");
        list.innerHTML = "";

        document.getElementById("lowStockCount").innerText = data.length;

        data.forEach(item => {
            let li = document.createElement("li");
            li.innerHTML = `<span class="alert">⚠ ${item.name}</span> - ${item.stock} left`;
            list.appendChild(li);
        });
    });
}

// LOGOUT
function logout(){
    fetch("http://localhost:8080/shopeasy/admin-logout")
    .then(() => window.location.href = "admin-login.html");
}

// INIT
loadOrders();
loadLowStock();

</script>

</body>
</html>
